spring.main.banner-mode=off
spring.jackson.default-property-inclusion=non_null
spring.main.allow-bean-definition-overriding=true
spring.application.name=encyclopaedia
server.port=7703
server.servlet.context-path=/encyclopaedia
server.compression.enabled=true
server.compression.mime-types=application/json,text/html
server.undertow.threads.io=16
server.undertow.threads.worker=256
server.undertow.buffer-size=1024
server.undertow.url-charset=UTF-8
server.undertow.direct-buffers=true



spring.datasource.url=jdbc:mysql://localhost:3306/fin_cust_account?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false
spring.datasource.username=dev
spring.datasource.password=dev123456
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=select 1



dubbo.application.name=encyclopaedia
dubbo.registry.address=nacos://172.20.90.14:8848?namespace=6e07ceb6-97a7-49de-a8ce-b66097165a27
dubbo.protocol.name=dubbo
dubbo.protocol.port=20880
dubbo.scan.base-packages=com.payermax.fintech.cust.account.interfaces.impl
dubbo.application.qos-port=22220
dubbo.application.qos-enable=true
dubbo.provider.filter=-exception
dubbo.provider.group=joe

